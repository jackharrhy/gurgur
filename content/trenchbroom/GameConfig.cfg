{
  "version": 9,
  "name": "Gurgur",
  "fileformats": [
    {
      "format": "Valve"
    }
  ],
  "filesystem": {
    "searchpath": ".",
    "packageformat": {
      "extension": ".zip",
      "format": "zip"
    }
  },
  "materials": {
    "root": "textures",
    "format": {
      "extensions": [
        ".png",
        ".jpg",
        ".jpeg"
      ],
      "format": "image"
    }
  },
  "entities": {
    "definitions": [
      "Gurgur.fgd"
    ],
    "defaultcolor": "0.6 0.7 0.65 1.0"
  },
  "tags": {
    "brush": [
      {
        "name": "Trigger",
        "attribs": [
          "transparent"
        ],
        "match": "classname",
        "pattern": "trigger_*"
      }
    ],
    "brushface": []
  },
  "faceattribs": {
    "defaults": {
      "scale": [
        0.5,
        0.5
      ]
    },
    "surfaceflags": [],
    "contentflags": []
  },
  "softMapBounds": "-4096 -4096 -4096 4096 4096 4096",
  "compilationTools": [
    {
      "name": "gurgur-compile-map",
      "description": "Gurgur deterministic Valve 220 compiler"
    }
  ]
}
