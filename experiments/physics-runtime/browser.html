<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Gurgur physics runtime experiment</title>
  </head>
  <body data-status="running">
    <script type="module">
      const worker = new Worker("/worker.js", { type: "module" });
      worker.onmessage = ({ data }) => {
        document.body.dataset.status = data.ok ? "passed" : "failed";
        document.body.textContent = JSON.stringify(data);
      };
      worker.onerror = ({ message }) => {
        document.body.dataset.status = "failed";
        document.body.textContent = JSON.stringify({ ok: false, error: message });
      };
    </script>
  </body>
</html>
